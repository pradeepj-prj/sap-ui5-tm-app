<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Skills Dashboard</title>
    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/1.120.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.f"
        data-sap-ui-resource-roots='{"com.sap.tm.dashboard": "./"}'
        data-sap-ui-compat-version="edge"
        data-sap-ui-async="true"
        data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
        data-sap-ui-frame-options="allow">
    </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    <div data-sap-ui-component
         data-name="com.sap.tm.dashboard"
         data-id="container"
         data-settings='{"id": "com.sap.tm.dashboard"}'>
    </div>
</body>
</html>
